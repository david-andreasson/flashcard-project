spring:
  config:
    # Load a local, gitignored .env (KEY=value) when present — e.g. ONEMIN_API_KEY, AI_PROVIDER.
    # `optional:` makes it a no-op when absent, so CI / prod / a fresh checkout use real env vars.
    import: "optional:file:.env[.properties],optional:file:backend/.env[.properties]"

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/flashcards}
    username: ${DATASOURCE_USERNAME:flashcard}
    password: ${DATASOURCE_PASSWORD:flashcard}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      # PDF upload limits (change 09). Extraction is in-memory; the file is never stored.
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:12MB}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  servlet:
    context-path: /api

# Application-specific configuration (auth)
app:
  # The user who registers with this email is granted ADMIN. Override per environment.
  admin-email: ${APP_ADMIN_EMAIL:davidandreasson@live.com}
  jwt:
    # HS256 signing secret. MUST be overridden in production. Min 32 bytes.
    secret: ${APP_JWT_SECRET:dev-only-insecure-secret-change-me-0123456789abcdef}
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}   # 15 minutes
    refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P7D}    # 7 days
  cookie:
    # false for local http dev so cookies transmit over http://localhost.
    # Production MUST set APP_COOKIE_SECURE=true (cookies only over https).
    secure: ${APP_COOKIE_SECURE:false}

# AI cost-protection infrastructure (change 06). Mock provider by default — no API key needed.
ai:
  enabled: ${AI_ENABLED:true}              # global kill-switch; false -> all AI calls 503
  provider: ${AI_PROVIDER:mock}            # mock | 1min  (mock is default; 1min added in change 07)
  max-input-chars: ${AI_MAX_INPUT_CHARS:24000}   # ~6-8 A4 pages (PDF import, change 09); quota still caps total spend
  default-max-tokens: ${AI_DEFAULT_MAX_TOKENS:1024}
  pricing:
    # USD per token. Rough proxy only: 1min.ai meters in credits and reports no token counts,
    # so logged cost is estimated. The token quota below is the real spend guardrail.
    input-rate: ${AI_PRICE_INPUT:0.000003}
    output-rate: ${AI_PRICE_OUTPUT:0.000015}
  quota:
    # Monthly token limits per plan. FREE is gated out anyway; ADMIN effectively unlimited.
    free: ${AI_QUOTA_FREE:0}
    premium: ${AI_QUOTA_PREMIUM:200000}
    admin: ${AI_QUOTA_ADMIN:100000000}
  # Provider-scoped settings for 1min.ai (used only when ai.provider=1min). Key comes from the env.
  onemin:
    base-url: ${ONEMIN_BASE_URL:https://api.1min.ai}
    api-key: ${ONEMIN_API_KEY:}
    model: ${ONEMIN_MODEL:claude-haiku-4-5-20251001}  # Claude Haiku 4.5 — 1min.ai's current Haiku slug
  card-generation:
    max-count: ${AI_CARD_MAX_COUNT:30}     # upper bound on cards generated per request
