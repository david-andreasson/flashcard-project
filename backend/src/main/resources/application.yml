spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5433/flashcards}
    username: ${DATASOURCE_USERNAME:flashcard}
    password: ${DATASOURCE_PASSWORD:flashcard}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  servlet:
    context-path: /api
