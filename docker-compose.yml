services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flashcards
      POSTGRES_USER: ${POSTGRES_USER:-flashcard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashcard}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
